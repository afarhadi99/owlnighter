name: app_core
description: owlnighter domain models, repository interfaces, and session controller (pure Dart).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  # Pure Dart. flutter_riverpod is intentionally NOT a dependency here — this
  # package stays framework-agnostic. The app layer provides the Riverpod
  # providers that wrap these controllers/repositories.
  meta: ^1.12.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
