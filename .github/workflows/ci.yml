name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TypeScript (build, typecheck, contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be available before setup-node's pnpm cache resolves.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from package.json "packageManager", so no pin here.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      # Regenerate the committed OpenAPI doc and fail if it drifts from what's
      # checked in — this keeps contracts/openapi.json honest (it's the source
      # the Dart + TS clients are generated from).
      - name: Contracts — OpenAPI is committed & up to date
        run: |
          pnpm contracts:openapi
          git diff --exit-code -- packages/ts/contracts/openapi.json \
            || (echo "::error::openapi.json is stale. Run 'pnpm contracts:openapi' and commit." && exit 1)

      # 63 tests, node --import tsx --test, no Postgres required (unit + inject
      # smoke tests only — nothing here talks to a real database).
      - name: API tests
        run: pnpm --filter @owlnighter/api test

  flutter:
    name: Flutter (format, analyze, test)
    runs-on: ubuntu-latest
    # Analyze + test are stable across the app and every Dart package now, so
    # this job is fully blocking — no continue-on-error anywhere below.
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/mobile
          - packages/dart/app_core
          - packages/dart/offline
          - packages/dart/design_system
          - packages/dart/api_client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      # Formatting is cheap and deterministic, so keep it blocking from day one.
      - name: Format check
        working-directory: ${{ matrix.package }}
        run: dart format --set-exit-if-changed .

      - name: Analyze
        working-directory: ${{ matrix.package }}
        run: flutter analyze

      # api_client has no test/ directory yet — analyze-clean is all we can
      # ask of it for now. Every other package has real tests, so run them.
      - name: Test
        working-directory: ${{ matrix.package }}
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test/ directory in ${{ matrix.package }} — analyze-only package, skipping."
          fi

      # An APK build step (flutter build apk) is intentionally not part of
      # this job — it's slow (multi-minute Gradle/AGP cold start) and belongs
      # in a separate, less-frequent release workflow instead.
